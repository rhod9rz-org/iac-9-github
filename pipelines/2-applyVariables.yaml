parameters:
  fullEnvironment: ''

variables:

# hub-uks
- ${{ if eq(parameters['fullEnvironment'], 'hub_uks') }}:
  # global
  - name: subscriptionId
    value: '10af0b2a-d76f-4d0f-b6f1-96160168d296'
  - name: environment
    value: 'hub'
  - name: region
    value: 'uks'
  # terraform
  - name: tfstateWhitelist
    value: 'false'
  - name: tfstateResourceGroup
    value: 'rg-hub-uks-01'
  - name: tfstateStorageAccount
    value: 'sacahubuksterraform'
  - name: tfstateContainerName
    value: 'iac-2-infrastructure-hub'
  - name: tfstateKey
    value: 'hub-uks.tfstate'
  - name: terraformVersion
    value: 'latest'
  # keyvault
  - name: keyvaultWhitelist
    value: 'false'
  - name: keyvaultSubscription
    value: ''
  - name: keyvaultName
    value: ''
  # testing
  - name: runCheckov
    value: 'false'
  # compile time parameters
  - name: useManagedDevopsPool
    value: 'true'
  - name: devopsPoolName
    value: 'mdp-hub-uks-01'
  - name: vmImageName
    value: ''
  - name: adoServiceConnection
    value: 'CA_Hub_01'
