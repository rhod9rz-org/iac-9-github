# .github/actions/apply/action.yml

name: apply

description: Terraform Apply Steps

runs:
  using: composite

  steps:

    - name: Common Before
      uses: ./.github/actions/common-before

    - name: Common Init
      uses: ./.github/actions/common-init

    - name: Common Plan
      id: commonPlan
      uses: ./.github/actions/common-plan

    - name: Check Plan Changed
      shell: bash
      run: |
        echo "***** Check Plan Changed *****"
        echo "planChanged=$(cat planChanged.txt)" >> "$GITHUB_ENV"
        cat planChanged.txt

    - name: Terraform Apply
      if: env.planChanged == 'true'
      shell: bash
      run: |
        echo "***** Terraform Apply *****"
        terraform apply \
          -input=false \
          "${tfEnvironment}-${tfRegion}-tfplan"
